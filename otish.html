<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ro'yxatdan o'tish</title>
    </head>
    <body>
        <section>
            <div class="tepa">
                <h1>Ro'yxatdan o'tish</h1>
            </div>
            <div class="orta">
                <input type="username" placeholder="Username">
                <input type="password" placeholder="Parol kiriting">
                <input type="password" placeholder="Parolni tasdiqlang">
            </div>
            <div class="btn">
                <a href="./ani.html"><button>Ro'yxatdan o'tish</button></a>
                <p>
                    Hisobingiz bormi?
                    <a href="./kirish.html">Kirish</a>
                </p>
            </div>
        </section>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: sans-serif;
            }
            body{
                background: linear-gradient(65deg, rgb(6, 6, 110),rgb(3, 3, 34));
                display: flex;
                justify-content: center;
                align-items: center;
            }
            section{
                width: 20%;
                height: 550px;
                margin-top: 12.5%;
                border: 1px solid blue;
                background-color: rgba(4, 4, 39, 0.726);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                border-radius: 12px;
                animation: top 3s ease forwards;
                .tepa{
                    color: yellow;
                    width: 100%;
                    height: 100px;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    font-size: 18px;
                    position: relative;
                    top: 50px;
                }
                .orta{
                    width: 100%;
                    position: relative;
                    bottom: 30px;
                    height: 300px;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    gap: 40px;
                    input{
                        width: 300px;
                        height: 40px;
                        border:none;
                        font-size: 15px;
                        border-bottom: 2px solid blue;
                        border-radius: 5px;
                        background: none;
                        color: white;
                    }
                }
                .btn{
                    width: 100%;
                    height: 100px;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    gap: 20px;
                    position: relative;
                    bottom: 30px;
                    button{
                        width: 270px;
                        height: 40px;
                        background: none;
                        border: 1px solid blue;
                        color: #fff;
                        font-size: 20px;
                        border-radius: 6px;
                    }
                    button:hover{
                        background: linear-gradient(45deg, rgb(36, 36, 233) , blue);
                        color: white;
                        transition: all 0.4s ease ;
                    }
                    p{
                        color: rgb(216, 204, 204);
                        position: relative;
                        top: 20px;
                        font-size: 15px;
                    }
                }
            }
            @keyframes top {
                from{
                    transform: translateY(-300px);
                    opacity: 0;
                }
                to{
                    transform: translateY(0);
                    opacity: 20;
                }
                
            }
        </style>
    </body>
</html>
